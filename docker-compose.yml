version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres-db

    environment:
      POSTGRES_DB: nexgen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: django-backend

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    environment:
      DB_NAME: nexgen
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: react-frontend

    depends_on:
      - backend

    ports:
      - "3000:3000"

volumes:
  postgres_data:
